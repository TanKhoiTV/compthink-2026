name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

  # Allow manual trigger from Actions tab
  workflow_dispatch:

# Grant GITHUB_TOKEN permissions for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build client bundle
        run: npm run build

      - name: Prepare deployment directory
        run: |
          mkdir -p _site/build _site/assets
          # Root files
          cp index.html _site/
          cp sw.js _site/
          cp manifest.json _site/
          # Build output
          cp build/client.js _site/build/
          cp build/client.css _site/build/
          # Assets (strip public/ prefix — SW expects /assets/...)
          cp -r public/assets/* _site/assets/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

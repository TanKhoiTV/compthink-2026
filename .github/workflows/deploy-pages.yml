name: Deploy to GitHub Pages (TREKPOLOGY)

on:
  push:
    branches: [main]

  # Allow manual trigger from Actions tab
  workflow_dispatch:

# Grant GITHUB_TOKEN permissions for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Build the LIVE game frontend from trekpology/feature-updates,
      # which carries the full TREKPOLOGY/ app (map select, tutorial, cities).
      - uses: actions/checkout@v4
        with:
          ref: trekpology/feature-updates
          lfs: true

      - name: Install Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build TREKPOLOGY frontend
        run: |
          npm install
          npm run build
        working-directory: TREKPOLOGY

      - name: Patch client socket URL → HF server
        run: |
          # Override the localhost URL to the HF Space server
          OLD_URL='"http://localhost:3001"'
          NEW_URL='"https://khoinguyentran-trekkopoly-old-server.hf.space"'
          sed -i "s|$OLD_URL|$NEW_URL|g" TREKPOLOGY/build/online/socketClient.js
          grep -n 'io("' TREKPOLOGY/build/online/socketClient.js

      - name: Prepare deployment directory
        run: |
          mkdir -p _site
          cp -r TREKPOLOGY/* _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

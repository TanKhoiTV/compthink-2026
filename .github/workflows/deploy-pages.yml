name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

  # Allow manual trigger from Actions tab
  workflow_dispatch:

# Grant GITHUB_TOKEN permissions for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        run: |
          npm install
          npm run build

      - name: Patch socket URL → HF old server
        run: |
          # Override the localhost URL to the old-stack HF Space
          OLD_URL='"http://localhost:3001"'
          NEW_URL='"https://khoinguyentran-trekkopoly-old-server.hf.space"'
          sed -i "s|$OLD_URL|$NEW_URL|g" build/online/socketClient.js
          grep -n 'io("' build/online/socketClient.js

      - name: Prepare deployment directory
        run: |
          mkdir -p _site
          cp -r build/* assets/ index.html sw.js manifest.json _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

# Deploys the old Node.js server to HF Space when server-relevant
# files change on main.
#
# The HF Space (khoinguyentran/trekkopoly-old-server) needs:
#   server/  src/data/  src/types.ts  Dockerfile  README.md
# Auth via HF_TOKEN secret (write scope) stored in GitHub secrets.
name: Deploy Server to HF Space

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "src/data/**"
      - "src/types.ts"
      - "Dockerfile"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout compthink-2026
        uses: actions/checkout@v4

      - name: Sync files to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -eux
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # Clone the target HF Space repo
          git clone \
            https://user:${HF_TOKEN}@huggingface.co/spaces/khoinguyentran/trekkopoly-old-server \
            /tmp/hf-space

          # Remove existing files from the HF clone (keep .git)
          cd /tmp/hf-space
          for item in * .*; do
            [ "$item" = "." ] && continue
            [ "$item" = ".." ] && continue
            [ "$item" = ".git" ] && continue
            rm -rf "$item"
          done

          # Copy new content from the current checkout
          cd "${GITHUB_WORKSPACE}"
          cp -r server /tmp/hf-space/server
          mkdir -p /tmp/hf-space/src/data
          cp -r src/data/. /tmp/hf-space/src/data/
          cp src/types.ts /tmp/hf-space/src/types.ts
          cp Dockerfile /tmp/hf-space/Dockerfile
          cp server/hf-readme.md \
             /tmp/hf-space/README.md

          # Commit and push
          cd /tmp/hf-space
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -m \
              "Sync server from compthink-2026@${GITHUB_SHA::7}"
            git push
          fi
